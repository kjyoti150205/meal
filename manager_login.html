<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Login - Meal Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="public/css/manager-auth.css">
</head>
<body class="mgr-auth-page">
    <div class="mgr-auth-container">
        <a href="index.html" class="mgr-auth-back">
            <i class="fas fa-arrow-left"></i> Back to Home
        </a>
        <div class="mgr-auth-card">
            <div class="mgr-auth-logo">
                <div class="icon-circle"><i class="fas fa-user-tie"></i></div>
                <h1>Manager Login</h1>
                <p>Sign in to access your dashboard</p>
            </div>
            <form id="loginForm" class="mgr-auth-form" onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="manager@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="mgr-password-wrap">
                        <input type="password" id="password" name="password" required placeholder="Enter your password">
                        <button type="button" class="mgr-password-toggle" onclick="togglePassword('password', this)" aria-label="Toggle password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="mgr-auth-submit" id="submitBtn">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>
            <div id="status" class="mgr-auth-status"></div>
            <div class="mgr-auth-links">
                Don't have an account? <a href="manager_register.html">Register here</a>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `mgr-auth-status ${type}`;
        }

        async function handleLogin(event) {
            event.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';

            try {
                const response = await fetch(`${API_BASE}/api/manager/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    const statusType = response.status === 403 ? 'warning' : 'error';
                    showStatus(data.message || 'Login failed', statusType);
                    return;
                }

                localStorage.setItem('managerToken', data.token);
                localStorage.setItem('manager', JSON.stringify(data.manager));

                showStatus('Login successful! Redirecting...', 'success');
                setTimeout(() => { window.location.href = 'manager_dashboard.html'; }, 800);
            } catch (error) {
                showStatus(error.message || 'Login failed. Please try again.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
            }
        }

        if (localStorage.getItem('managerToken')) {
            window.location.href = 'manager_dashboard.html';
        }
    </script>
</body>
</html>
