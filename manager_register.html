<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Registration - Meal Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="public/css/manager-auth.css">
</head>
<body class="mgr-auth-page">
    <div class="mgr-auth-container">
        <a href="index.html" class="mgr-auth-back">
            <i class="fas fa-arrow-left"></i> Back to Home
        </a>
        <div class="mgr-auth-card">
            <div class="mgr-auth-logo">
                <div class="icon-circle"><i class="fas fa-user-shield"></i></div>
                <h1>Manager Registration</h1>
                <p>Create your manager account</p>
            </div>
            <form id="registerForm" class="mgr-auth-form" onsubmit="return handleRegister(event)">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" required placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="manager@example.com">
                </div>
                <div class="mgr-form-row">
                    <div class="form-group">
                        <label for="managerId">Manager ID</label>
                        <input type="text" id="managerId" placeholder="Optional">
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone</label>
                        <input type="tel" id="phone" placeholder="Optional">
                    </div>
                </div>
                <div class="mgr-form-row">
                    <div class="form-group">
                        <label for="hostelName">Hostel Name</label>
                        <input type="text" id="hostelName" placeholder="Optional">
                    </div>
                    <div class="form-group">
                        <label for="designation">Designation</label>
                        <input type="text" id="designation" placeholder="Optional">
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="mgr-password-wrap">
                        <input type="password" id="password" required placeholder="Min. 6 characters">
                        <button type="button" class="mgr-password-toggle" onclick="togglePassword('password', this)" aria-label="Toggle password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="mgr-password-wrap">
                        <input type="password" id="confirmPassword" required placeholder="Confirm password">
                        <button type="button" class="mgr-password-toggle" onclick="togglePassword('confirmPassword', this)" aria-label="Toggle confirm password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="mgr-auth-submit" id="submitBtn">
                    <i class="fas fa-user-plus"></i> Register as Manager
                </button>
            </form>
            <div id="status" class="mgr-auth-status"></div>
            <div class="mgr-auth-links">
                Already have an account? <a href="manager_login.html">Login here</a>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `mgr-auth-status ${type}`;
        }

        async function handleRegister(event) {
            event.preventDefault();
            const submitBtn = document.getElementById('submitBtn');

            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const managerId = document.getElementById('managerId').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const hostelName = document.getElementById('hostelName').value.trim();
            const designation = document.getElementById('designation').value.trim();

            if (password !== confirmPassword) {
                showStatus('Passwords do not match', 'error');
                return;
            }

            if (password.length < 6) {
                showStatus('Password must be at least 6 characters long', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Registering...';

            try {
                const response = await fetch(`${API_BASE}/api/manager/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fullName, email, password, managerId, phone, hostelName, designation })
                });

                const data = await response.json();

                if (!response.ok) {
                    showStatus(data.message || 'Registration failed', 'error');
                    return;
                }

                showStatus(data.message || 'Registration successful! Redirecting to login...', 'success');
                setTimeout(() => { window.location.href = 'manager_login.html'; }, 2500);
            } catch (error) {
                showStatus(error.message || 'An error occurred. Please try again.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-user-plus"></i> Register as Manager';
            }
        }
    </script>
</body>
</html>
