<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register - Meal Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
:root{
    --primary:#4f5df3;
    --secondary:#6b7cff;
    --success:#4CAF50;
    --danger:#f44336;
    --text:#333;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#4f5df3,#4b2de2);
    display:flex;
    justify-content:center;
    align-items:center;
    overflow-y:auto;
    padding:20px;
    position:relative;
}

/* Background */
body::before{
    content:"";
    position:absolute;
    width:320px;
    height:320px;
    border-radius:50%;
    background:rgba(255,255,255,.12);
    top:-100px;
    left:-80px;
    filter:blur(10px);
}

body::after{
    content:"";
    position:absolute;
    width:260px;
    height:260px;
    border-radius:50%;
    background:rgba(255,255,255,.08);
    bottom:-80px;
    right:-60px;
    filter:blur(10px);
}

.container{
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    z-index:10;
}

.card{
    width:100%;
    max-width:470px;
    background:rgba(255,255,255,.95);
    backdrop-filter:blur(20px);
    border-radius:25px;
    padding:25px 30px;
    box-shadow:0 20px 50px rgba(0,0,0,.25);
    animation:fadeIn .7s ease;
    transition:.3s;
}

.card:hover{
    transform:translateY(-4px);
}

.header{
    text-align:center;
    margin-bottom:18px;
}

.header h1{
    color:#4f5df3;
    font-size:32px;
    margin-bottom:12px;
}

.home-btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    padding:10px 18px;
    border-radius:12px;
    background:#4f5df3;
    color:white;
    text-decoration:none;
    font-weight:600;
    transition:.3s;
}

.home-btn:hover{
    background:#3346d3;
    transform:translateY(-2px);
}

.form-group{
    margin-bottom:12px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:600;
    color:#444;
    font-size:14px;
}

input{
    width:100%;
    padding:12px 15px;
    border:2px solid #ddd;
    border-radius:12px;
    font-size:15px;
    outline:none;
    transition:.3s;
}

input:focus{
    border-color:#4f5df3;
    box-shadow:0 0 15px rgba(79,93,243,.25);
    transform:scale(1.02);
}

.submit-btn{
    width:100%;
    margin-top:8px;
    padding:14px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#4f5df3,#6b7cff);
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:8px;
    transition:.3s;
}

.submit-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 15px 25px rgba(79,93,243,.35);
}

.links{
    text-align:center;
    margin-top:15px;
}

.links p{
    font-size:14px;
}

.links a{
    color:#4f5df3;
    font-weight:600;
    text-decoration:none;
}

.links a:hover{
    text-decoration:underline;
}

#status{
    display:none;
    margin-top:12px;
    padding:10px;
    border-radius:10px;
    text-align:center;
    font-weight:600;
}

#status.success{
    display:block;
    background:#e8f5e9;
    color:#4CAF50;
}

#status.error{
    display:block;
    background:#ffebee;
    color:#f44336;
}

@keyframes fadeIn{

from{
    opacity:0;
    transform:translateY(40px);
}

to{
    opacity:1;
    transform:translateY(0);
}

}

@media(max-width:768px){

body{
    padding:15px;
}

.card{
    padding:22px;
}

.header h1{
    font-size:28px;
}

.home-btn{
    width:100%;
}

}
</style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <h1>Meal Tracker</h1>
        <a href="index.html" class="home-btn">
            <i class="fas fa-home"></i> Home
        </a>
      </div>
      <form id="registerForm" onsubmit="return handleRegister(event)">
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" name="fullName" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
    <label for="phone">
        <i class="fas fa-phone"></i> Phone Number
    </label>

    <input
        type="tel"
        id="phone"
        name="phone"
        placeholder="Enter 10 digit phone number"
        pattern="[0-9]{10}"
        maxlength="10"
        required
    >
</div>
<div id="status"></div>
        <div class="form-group">
          <label for="instituteId">Institute ID (6 digits)</label>
          <input type="text" id="instituteId" name="instituteId" pattern="[0-9]{6}" maxlength="6" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" required>
        </div>
        <button type="submit" class="submit-btn">
          <i class="fas fa-user-plus"></i> Register
        </button>
      </form>
      <div id="status"></div>
      <div class="links">
        <p>Already have an account? <a href="login.html">Login here</a></p>
      </div>
    </div>
  </div>

  <script>
    function showError(message) {
    const statusDiv = document.getElementById("status");
    statusDiv.textContent = message;
    statusDiv.className = "error";
    statusDiv.style.display = "block";

    setTimeout(() => {
        statusDiv.style.display = "none";
    }, 3000);
}

function showSuccess(message) {
    const statusDiv = document.getElementById("status");
    statusDiv.textContent = message;
    statusDiv.className = "success";
    statusDiv.style.display = "block";

    setTimeout(() => {
        statusDiv.style.display = "none";
    }, 3000);
}
    
    // ============================
// PAGE LOAD ANIMATION
// ============================
window.addEventListener("load", () => {
    const card = document.querySelector(".card");

    card.style.opacity = "0";
    card.style.transform = "translateY(60px) scale(.9)";

    setTimeout(() => {
        card.style.transition = "all .8s ease";
        card.style.opacity = "1";
        card.style.transform = "translateY(0) scale(1)";
    }, 200);
});


// ============================
// FLOATING FOOD EMOJIS
// ============================
const foods = ["🍕","🍔","🍟","🥗","🍜","🥤"];

foods.forEach((food,index)=>{

    const div=document.createElement("div");

    div.innerHTML=food;

    div.style.position="fixed";
    div.style.fontSize="45px";
    div.style.pointerEvents="none";
    div.style.zIndex="0";
    div.style.opacity=".7";

    if(index<3){

        div.style.left="20px";
        div.style.top=(15+index*25)+"%";

    }else{

        div.style.right="20px";
        div.style.top=(15+(index-3)*25)+"%";

    }

    document.body.appendChild(div);

    let angle=Math.random()*100;

    setInterval(()=>{

        angle+=0.05;

        div.style.transform=
        `translateY(${Math.sin(angle)*20}px)
         rotate(${Math.sin(angle)*10}deg)
         scale(${1+Math.sin(angle)*0.05})`;

    },20);

});


// ============================
// INPUT ANIMATION
// ============================
document.querySelectorAll("input").forEach(input=>{

    input.addEventListener("focus",()=>{

        input.animate([

            {transform:"scale(1)"},

            {transform:"scale(1.03)"},

            {transform:"scale(1)"}

        ],{

            duration:300

        });

    });

});


// ============================
// CARD 3D EFFECT
// ============================
const card=document.querySelector(".card");

document.addEventListener("mousemove",(e)=>{

    const x=(window.innerWidth/2-e.clientX)/45;

    const y=(window.innerHeight/2-e.clientY)/45;

    card.style.transform=
    `rotateY(${x}deg) rotateX(${-y}deg)`;

});

document.addEventListener("mouseleave",()=>{

    card.style.transform="rotateY(0deg) rotateX(0deg)";

});


// ============================
// BUTTON ANIMATION
// ============================
const btn=document.querySelector(".submit-btn");

btn.addEventListener("mouseenter",()=>{

    btn.animate([

        {transform:"translateY(0px)"},

        {transform:"translateY(-5px)"},

        {transform:"translateY(0px)"}

    ],{

        duration:350

    });

});
async function handleRegister(event) {
    event.preventDefault();

    const fullName = document.getElementById('fullName').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const email = document.getElementById('email').value.trim();
    const instituteId = document.getElementById('instituteId').value.trim();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    if (!/^[0-9]{10}$/.test(phone)) {
        showError("Phone Number must be exactly 10 digits");
        return;
    }

    if (!/^\d{6}$/.test(instituteId)) {
        showError("Institute ID must be exactly 6 digits");
        return;
    }

    if (password !== confirmPassword) {
        showError("Passwords do not match");
        return;
    }

    try {
        const response = await fetch("http://localhost:3000/api/register", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                fullName,
                email,
                phone,
                instituteId,
                password
            })
        });

        const data = await response.json();

        if (!response.ok) {
            throw new Error(data.message);
        }

        showSuccess("Registration Successful!");

        setTimeout(() => {
            window.location.href = "login.html";
        }, 2000);

    } catch (error) {
        showError(error.message);
    }
}
    // 👇 YAHAN ADD KARO
  </script>
</body>
</html>
