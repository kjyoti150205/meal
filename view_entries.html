<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Entries - Meal Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="public/css/manager-dashboard.css">
</head>
<body>
    <div class="mgr-sidebar-overlay" id="mgrSidebarOverlay"></div>

    <div class="mgr-layout">
        <aside class="mgr-sidebar" id="mgrSidebar">
            <div class="mgr-sidebar-brand">
                <i class="fas fa-utensils"></i>
                <div><h2>Meal Tracker</h2><span>Manager Portal</span></div>
            </div>
            <nav class="mgr-nav">
                <a href="manager_dashboard.html" class="mgr-nav-link" data-page="dashboard"><i class="fas fa-th-large"></i> Dashboard</a>
                <a href="view_entries.html" class="mgr-nav-link" data-page="entries"><i class="fas fa-list-alt"></i> View Entries</a>
                <a href="student_records.html" class="mgr-nav-link" data-page="records"><i class="fas fa-user-graduate"></i> Student Records</a>
                <a href="reports.html" class="mgr-nav-link" data-page="reports"><i class="fas fa-chart-line"></i> Reports</a>
                <a href="profile.html?role=manager" class="mgr-nav-link" data-page="profile"><i class="fas fa-user-circle"></i> Profile</a>
            </nav>
            <div class="mgr-sidebar-footer">
                <div class="mgr-user-card">
                    <div class="mgr-user-avatar" id="mgrUserAvatar">M</div>
                    <div class="mgr-user-info"><strong id="mgrUserName">Manager</strong><small>Manager</small></div>
                </div>
                <button class="mgr-btn mgr-btn-outline" id="mgrLogoutBtn" style="width:100%;color:#fff;border-color:rgba(255,255,255,0.2);"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </aside>

        <main class="mgr-main">
            <header class="mgr-topbar">
                <div style="display:flex;align-items:center;gap:0.75rem;">
                    <button class="mgr-menu-toggle" id="mgrMenuToggle" aria-label="Toggle menu"><i class="fas fa-bars"></i></button>
                    <h1>View Entries</h1>
                </div>
            </header>

            <div class="mgr-content">
                <div class="mgr-card">
                    <div class="mgr-card-header"><h2>Meal Entries</h2></div>
                    <div class="mgr-card-body">
                        <div class="mgr-filters">
                            <input type="text" class="mgr-input" id="searchInput" placeholder="Search name, department, room...">
                            <select class="mgr-select" id="sessionFilter">
                                <option value="">All Sessions</option>
                                <option value="Morning">Morning</option>
                                <option value="Evening">Evening</option>
                            </select>
                            <button class="mgr-btn mgr-btn-primary" onclick="applyFilters()"><i class="fas fa-filter"></i> Filter</button>
                            <button class="mgr-btn mgr-btn-outline" onclick="loadEntries()"><i class="fas fa-sync-alt"></i> Refresh</button>
                        </div>
                        <div class="mgr-table-wrap">
                            <table class="mgr-table">
                                <thead>
                                    <tr>
                                        <th>Name</th>
                                        <th>Department</th>
                                        <th>Room</th>
                                        <th>Session</th>
                                        <th>Status</th>
                                        <th>Timestamp</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="entriesTableBody">
                                    <tr><td colspan="7"><div class="mgr-empty"><i class="fas fa-spinner fa-spin"></i><p>Loading entries...</p></div></td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="public/js/manager-common.js"></script>
    <script>
        let allEntries = [];

        async function loadEntries() {
            try {
                allEntries = await managerFetch('/api/manager/entries');
                displayEntries(allEntries);
            } catch (error) {
                document.getElementById('entriesTableBody').innerHTML =
                    `<tr><td colspan="7"><div class="mgr-empty"><i class="fas fa-exclamation-circle"></i><p>${escapeHtml(error.message)}</p></div></td></tr>`;
            }
        }

        function displayEntries(entries) {
            const tableBody = document.getElementById('entriesTableBody');

            if (entries.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="7"><div class="mgr-empty"><i class="fas fa-inbox"></i><p>No entries found</p></div></td></tr>';
                return;
            }

            tableBody.innerHTML = entries.map((entry) => `
                <tr>
                    <td>${escapeHtml(entry.name)}</td>
                    <td>${escapeHtml(entry.department || '—')}</td>
                    <td>${escapeHtml(entry.roomNumber || '—')}</td>
                    <td>${escapeHtml(entry.session)}</td>
                    <td><span class="mgr-badge ${(entry.status || '').toLowerCase() === 'on' ? 'success' : 'danger'}">${escapeHtml(entry.status)}</span></td>
                    <td>${formatDateTime(entry.timestamp)}</td>
                    <td>
                        <button class="mgr-btn mgr-btn-danger mgr-btn-sm" onclick="deleteEntry('${entry._id}')">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        async function deleteEntry(entryId) {
            if (!confirm('Are you sure you want to delete this entry?')) return;

            try {
                await managerFetch(`/api/manager/entries/${entryId}`, { method: 'DELETE' });
                await loadEntries();
            } catch (error) {
                alert(error.message);
            }
        }

        function applyFilters() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const sessionFilter = document.getElementById('sessionFilter').value;

            const filtered = allEntries.filter((entry) => {
                const matchesSearch = !searchTerm ||
                    (entry.name || '').toLowerCase().includes(searchTerm) ||
                    (entry.department || '').toLowerCase().includes(searchTerm) ||
                    (entry.roomNumber || '').toLowerCase().includes(searchTerm);
                const matchesSession = !sessionFilter || entry.session === sessionFilter;
                return matchesSearch && matchesSession;
            });

            displayEntries(filtered);
        }

        if (checkManagerAuth()) {
            initSidebar('entries');
            loadEntries();
        }
    </script>
</body>
</html>
