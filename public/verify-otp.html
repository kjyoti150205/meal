<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify OTP - Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <div class="container">
    <a href="admin-forgot-password.html" class="back-link">
      <i class="fas fa-arrow-left"></i> Back
    </a>
    <div class="card">
      <div class="header">
        <h1><i class="fas fa-shield-alt"></i> Verify OTP</h1>
        <p>Enter the 6-digit OTP sent to your email</p>
      </div>
      <div class="step-indicator">
        <span class="step-dot"></span>
        <span class="step-dot active"></span>
        <span class="step-dot"></span>
      </div>
      <form id="verifyForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" required autocomplete="email" readonly>
        </div>
        <div class="form-group">
          <label for="otp">OTP</label>
          <input type="text" id="otp" name="otp" required maxlength="6" pattern="\d{6}" inputmode="numeric" placeholder="123456">
          <p class="otp-hint">OTP is valid for 10 minutes</p>
        </div>
        <button type="submit" class="submit-btn" id="submitBtn">
          <i class="fas fa-check-circle"></i> Verify OTP
        </button>
      </form>
      <div id="status"></div>
      <div class="links">
        <a href="admin-forgot-password.html">Resend OTP</a>
      </div>
    </div>
  </div>
  <script src="js/verify-otp.js"></script>
</body>
</html>
