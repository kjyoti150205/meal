<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <div class="container">
    <a href="admin-login.html" class="back-link">
      <i class="fas fa-arrow-left"></i> Back to Admin Login
    </a>
    <div class="card">
      <div class="header">
        <h1><i class="fas fa-key"></i> Forgot Password</h1>
        <p>Enter your registered admin email to receive an OTP</p>
      </div>
      <div class="step-indicator">
        <span class="step-dot active"></span>
        <span class="step-dot"></span>
        <span class="step-dot"></span>
      </div>
      <form id="forgotForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" required autocomplete="email" placeholder="admin@example.com">
        </div>
        <button type="submit" class="submit-btn" id="submitBtn">
          <i class="fas fa-paper-plane"></i> Send OTP
        </button>
      </form>
      <div id="status"></div>
      <div class="links">
        <a href="admin-login.html">Back to Login</a>
      </div>
    </div>
  </div>
  <script src="js/admin-forgot-password.js"></script>
</body>
</html>
