<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <div class="container">
    <a href="admin-login.html" class="back-link">
      <i class="fas fa-arrow-left"></i> Back to Login
    </a>
    <div class="card">
      <div class="header">
        <h1><i class="fas fa-lock"></i> Reset Password</h1>
        <p>Create a new password for your admin account</p>
      </div>
      <div class="step-indicator">
        <span class="step-dot"></span>
        <span class="step-dot"></span>
        <span class="step-dot active"></span>
      </div>
      <form id="resetForm">
        <div class="form-group">
          <label for="newPassword">New Password</label>
          <input type="password" id="newPassword" name="newPassword" required minlength="6" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" required minlength="6" autocomplete="new-password">
        </div>
        <button type="submit" class="submit-btn" id="submitBtn">
          <i class="fas fa-save"></i> Reset Password
        </button>
      </form>
      <div id="status"></div>
    </div>
  </div>
  <script src="js/reset-password.js"></script>
</body>
</html>
