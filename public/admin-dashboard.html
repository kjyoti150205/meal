<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Meal Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="css/admin-dashboard.css">
</head>
<body>
  <div class="dashboard">
    <header class="topbar">
      <h1><i class="fas fa-shield-alt"></i> Admin Verification Dashboard</h1>
      <div class="topbar-actions">
        <span class="admin-meta" id="adminMeta"></span>
        <button class="btn btn-outline" id="logoutBtn">
          <i class="fas fa-sign-out-alt"></i> Logout
        </button>
      </div>
    </header>

    <section class="stats-row">
      <div class="stat-card pending">
        <div class="label">Pending</div>
        <div class="value" id="pendingCount">0</div>
      </div>
      <div class="stat-card approved">
        <div class="label">Approved</div>
        <div class="value" id="approvedCount">0</div>
      </div>
      <div class="stat-card rejected">
        <div class="label">Rejected</div>
        <div class="value" id="rejectedCount">0</div>
      </div>
    </section>

    <nav class="tabs">
      <button class="tab-btn active" data-tab="pending">Pending Users</button>
      <button class="tab-btn" data-tab="approved">Approved Users</button>
      <button class="tab-btn" data-tab="rejected">Rejected Users</button>
    </nav>

    <section class="panel">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Institute ID</th>
              <th>Department</th>
              <th>Room</th>
              <th>Registered</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="usersTableBody">
            <tr><td colspan="8" class="loading">Loading users...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>

  <div class="toast" id="toast"></div>

  <div class="modal-overlay" id="detailsModal">
    <div class="modal">
      <h2><i class="fas fa-user"></i> User Details</h2>
      <div class="detail-grid" id="detailGrid"></div>
      <div class="modal-actions">
        <button class="btn btn-outline" id="closeModalBtn">Close</button>
      </div>
    </div>
  </div>

  <script src="js/admin-dashboard.js"></script>
</body>
</html>
