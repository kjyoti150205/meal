<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password - Meal Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Add EmailJS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root {
            --primary-color: #f32144;
            --text-color: #333;
            --bg-color: #f5f7fa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .reset-container {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        .reset-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .reset-header h1 {
            color: var(--primary-color);
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .reset-header p {
            color: #666;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-color);
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .otp-inputs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            justify-content: center;
        }

        .otp-inputs input {
            width: 50px;
            height: 50px;
            text-align: center;
            font-size: 1.2rem;
            padding: 0;
        }

        .reset-btn {
            width: 100%;
            padding: 1rem;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .reset-btn:hover {
            background: #d41b3f;
            transform: translateY(-2px);
        }

        .reset-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .links {
            text-align: center;
            margin-top: 1rem;
        }

        .links a {
            color: var(--primary-color);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .links a:hover {
            text-decoration: underline;
        }

        #error-message {
            color: #f44336;
            text-align: center;
            margin-top: 1rem;
            display: none;
        }

        #success-message {
            color: #4CAF50;
            text-align: center;
            margin-top: 1rem;
            display: none;
        }

        .timer {
            text-align: center;
            margin-top: 1rem;
            color: #666;
            font-size: 0.9rem;
        }

        .step {
            display: none;
        }

        .step.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="reset-header">
            <h1>Reset Password</h1>
            <p>Enter your email to reset your password</p>
        </div>

        <!-- Step 1: Email -->
        <div id="step1" class="step active">
            <form id="emailForm" onsubmit="return false;">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email address" required>
                </div>
                <button type="submit" class="reset-btn" onclick="sendOTP()">
                    Send OTP
                </button>
            </form>
        </div>

        <!-- Step 2: OTP Verification -->
        <div id="step2" class="step">
            <form id="otpForm" onsubmit="return false;">
                <div class="form-group">
                    <label>Enter OTP</label>
                    <div class="otp-inputs">
                        <input type="text" maxlength="1" pattern="[0-9]" required>
                        <input type="text" maxlength="1" pattern="[0-9]" required>
                        <input type="text" maxlength="1" pattern="[0-9]" required>
                        <input type="text" maxlength="1" pattern="[0-9]" required>
                        <input type="text" maxlength="1" pattern="[0-9]" required>
                        <input type="text" maxlength="1" pattern="[0-9]" required>
                    </div>
                </div>
                <div class="timer" id="timer">Resend OTP in: 60s</div>
                <button type="submit" class="reset-btn" onclick="verifyOTP()">
                    Verify OTP
                </button>
            </form>
        </div>

        <!-- Step 3: New Password -->
        <div id="step3" class="step">
            <form id="passwordForm" onsubmit="return false;">
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" name="newPassword" required>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required>
                </div>
                <button type="submit" class="reset-btn" onclick="resetPassword()">
                    Reset Password
                </button>
            </form>
        </div>

        <div id="error-message"></div>
        <div id="success-message"></div>
        <div class="links">
            <a href="login.html">Back to Login</a>
        </div>
    </div>

    <script>
        // Initialize EmailJS
        (function() {
            emailjs.init("B_Pkgp9rUmv8IIBLG"); // Your public key is correct
        })();

        let currentOTP = '';
        let countdown = 60;
        let timerInterval;
        let currentEmail = '';

        function showStep(stepNumber) {
            document.querySelectorAll('.step').forEach(step => step.classList.remove('active'));
            document.getElementById(`step${stepNumber}`).classList.add('active');
        }

        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 3000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('success-message');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 3000);
        }

        function startTimer() {
            const timerDiv = document.getElementById('timer');
            countdown = 60;
            timerDiv.textContent = `Resend OTP in: ${countdown}s`;
            
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                countdown--;
                timerDiv.textContent = `Resend OTP in: ${countdown}s`;
                
                if (countdown <= 0) {
                    clearInterval(timerInterval);
                    timerDiv.textContent = 'OTP expired. Please request a new one.';
                }
            }, 1000);
        }

        function generateOTP() {
            return Math.floor(100000 + Math.random() * 900000).toString();
        }

        async function sendOTP() {
            const email = document.getElementById('email').value;
            
            if (!email) {
                showError('Please enter your email address');
                return;
            }

            // Get users from localStorage
            const users = JSON.parse(localStorage.getItem('users')) || [];
            const user = users.find(u => u.email === email);

            if (!user) {
                showError('Email not registered');
                return;
            }

            currentEmail = email;
            currentOTP = generateOTP();
            
            // Send OTP via EmailJS
            try {
                const templateParams = {
                    to_email: email,
                    otp: currentOTP,
                    subject: 'Password Reset OTP'
                };

                // TODO: Replace with your EmailJS Service ID (should start with 'service_')
                // You can find this in your EmailJS dashboard under Email Services
                await emailjs.send('service_bz0cavg', 'template_eoy0pbq', templateParams);
                
                showStep(2);
                startTimer();
                showSuccess('OTP sent successfully to your email!');
                document.querySelector('.otp-inputs input').focus();
            } catch (error) {
                console.error('Error sending email:', error);
                showError(`Failed to send OTP: ${error.message || 'Please try again'}`);
            }
        }

        function verifyOTP() {
            const otpInputs = document.querySelectorAll('.otp-inputs input');
            const enteredOTP = Array.from(otpInputs).map(input => input.value).join('');

            if (enteredOTP === currentOTP) {
                showStep(3);
                showSuccess('OTP verified successfully!');
            } else {
                showError('Invalid OTP');
            }
        }

        function resetPassword() {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }

            // Get users from localStorage
            const users = JSON.parse(localStorage.getItem('users')) || [];
            const userIndex = users.findIndex(u => u.email === currentEmail);

            if (userIndex === -1) {
                showError('User not found');
                return;
            }

            // Update password
            users[userIndex].password = newPassword;
            localStorage.setItem('users', JSON.stringify(users));

            showSuccess('Password reset successful!');
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2000);
        }

        // Auto-focus next input in OTP fields
        document.querySelectorAll('.otp-inputs input').forEach((input, index) => {
            input.addEventListener('input', function(e) {
                // Only allow numbers
                this.value = this.value.replace(/[^0-9]/g, '');
                
                if (this.value.length === 1) {
                    const nextInput = document.querySelectorAll('.otp-inputs input')[index + 1];
                    if (nextInput) {
                        nextInput.focus();
                    }
                }
            });

            input.addEventListener('keydown', function(e) {
                if (e.key === 'Backspace' && !this.value) {
                    const prevInput = document.querySelectorAll('.otp-inputs input')[index - 1];
                    if (prevInput) {
                        prevInput.focus();
                    }
                }
            });

            // Handle paste event
            input.addEventListener('paste', function(e) {
                e.preventDefault();
                const pastedData = e.clipboardData.getData('text').slice(0, 6);
                if (/^\d+$/.test(pastedData)) {
                    const inputs = document.querySelectorAll('.otp-inputs input');
                    pastedData.split('').forEach((digit, i) => {
                        if (inputs[i]) {
                            inputs[i].value = digit;
                        }
                    });
                    if (inputs[pastedData.length]) {
                        inputs[pastedData.length].focus();
                    }
                }
            });
        });
    </script>
</body>
</html>
