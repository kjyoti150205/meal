<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Meal Tracker</title>
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #f32144;
            --success-color: #4CAF50;
            --danger-color: #f44336;
            --text-color: #333;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-color);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            background: white;
            padding: 1.5rem 2rem;
            border-radius: 15px;
            box-shadow: var(--shadow);
        }

        .header h1 {
            color: var(--primary-color);
            font-size: 1.8rem;
        }

        .back-btn {
            padding: 0.8rem 1.5rem;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-btn:hover {
            background-color: #d91a3a;
        }

        .profile-card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: var(--shadow);
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary-color);
        }

        .profile-info h2 {
            color: var(--text-color);
            margin-bottom: 0.5rem;
        }

        .profile-info p {
            color: #666;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-color);
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(243, 33, 68, 0.1);
        }

        .save-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .save-btn:hover {
            background-color: #d91a3a;
            transform: translateY(-2px);
        }

        #status {
            text-align: center;
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 10px;
            font-weight: 500;
            display: none;
        }

        #status.success {
            display: block;
            background-color: #e8f5e9;
            color: var(--success-color);
        }

        #status.error {
            display: block;
            background-color: #ffebee;
            color: var(--danger-color);
        }

        .upload-pic {
            margin-top: 1rem;
            text-align: center;
        }

        .upload-pic label {
            display: inline-block;
            padding: 0.8rem 1.5rem;
            background: var(--primary-color);
            color: white;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-pic label:hover {
            background-color: #d91a3a;
        }

        .upload-pic input[type="file"] {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Profile Settings</h1>
            <a href="user_dashboard.html" class="back-btn">
                <i class="fas fa-arrow-left"></i> Back to Dashboard
            </a>
        </div>

        <div class="profile-card">
            <div class="profile-header">
                <img src="https://via.placeholder.com/120" alt="Profile Picture" class="profile-pic" id="profilePic">
                <div class="profile-info">
                    <h2 id="userName">Loading...</h2>
                    <p id="userEmail">Loading...</p>
                </div>
            </div>

            <form id="profileForm" onsubmit="return updateProfile(event)">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" name="fullName" required>
                </div>

                <div class="form-group">
                    <label for="department">Department</label>
                    <input type="text" id="department" name="department" required>
                </div>

                <div class="form-group">
                    <label for="roomNumber">Room Number</label>
                    <input type="text" id="roomNumber" name="roomNumber" required>
                </div>

                <div class="form-group">
                    <label for="instituteId">Institute ID</label>
                    <input type="text" id="instituteId" name="instituteId">
                </div>

                <div class="upload-pic">
                    <label for="photoUpload">
                        <i class="fas fa-camera"></i> Change Profile Picture
                    </label>
                    <input type="file" id="photoUpload" accept="image/*" onchange="handlePhotoUpload(event)">
                </div>

                <button type="submit" class="save-btn">
                    <i class="fas fa-save"></i> Save Changes
                </button>
            </form>

            <div id="status"></div>
        </div>
    </div>

    <script>
        // Check if user is logged in
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) {
            window.location.href = 'login.html';
        }

        // Load user data
        document.getElementById('userName').textContent = user.fullName || 'Not set';
        document.getElementById('userEmail').textContent = user.email;
        document.getElementById('fullName').value = user.fullName || '';
        document.getElementById('department').value = user.department || '';
        document.getElementById('roomNumber').value = user.roomNumber || '';
        document.getElementById('instituteId').value = user.instituteId || '';

        // Set profile picture
      const profilePic = document.getElementById('profilePic');

if (user.photoUrl) {
    profilePic.src = user.photoUrl.startsWith('http')
        ? user.photoUrl
        : `http://localhost:3000${user.photoUrl}`;
}

async function handlePhotoUpload(event) {
    const file = event.target.files[0];
    if (!file) return;

    const formData = new FormData();
    formData.append('photo', file);
    formData.append('userId', user._id);

    try {
        const response = await fetch(
            'http://localhost:3000/api/users/upload-photo',
            {
                method: 'POST',
                body: formData
            }
        );

        const data = await response.json();

        if (!response.ok) {
            throw new Error(data.message || 'Upload failed');
        }

        const imageUrl = data.photoUrl.startsWith('http')
            ? data.photoUrl
            : `http://localhost:3000${data.photoUrl}`;

        profilePic.src = imageUrl;

        user.photoUrl = imageUrl;
        localStorage.setItem('user', JSON.stringify(user));

        showStatus('Profile picture updated successfully!', 'success');

    } catch (error) {
        console.error(error);
        showStatus('Failed to upload photo', 'error');
    }
}

        // Update profile
        async function updateProfile(event) {
            event.preventDefault();
            const status = document.getElementById('status');

            const updatedUser = {
                ...user,
                fullName: document.getElementById('fullName').value,
                department: document.getElementById('department').value,
                roomNumber: document.getElementById('roomNumber').value,
                instituteId: document.getElementById('instituteId').value
            };

            try {
                console.log('Sending update request:', updatedUser);
                const response = await fetch(`http://localhost:3000/api/users/${user._id}/profile`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(updatedUser)
                });

                const data = await response.json();
                console.log('Server response:', data);

                if (!response.ok) {
                    throw new Error(data.message || 'Failed to update profile');
                }

                localStorage.setItem('user', JSON.stringify(data.user));
                showStatus('Profile updated successfully!', 'success');

                // Update displayed name
                document.getElementById('userName').textContent = data.user.fullName;
            } catch (error) {
                console.error('Error updating profile:', error);
                showStatus(error.message || 'Failed to update profile. Please try again.', 'error');
            }
        }

        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = type;
            setTimeout(() => {
                status.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
