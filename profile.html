<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Meal Tracker</title>
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #f32144;
            --success-color: #4CAF50;
            --danger-color: #f44336;
            --text-color: #333;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-color);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            background: white;
            padding: 1.5rem 2rem;
            border-radius: 15px;
            box-shadow: var(--shadow);
        }

        .header h1 {
            color: var(--primary-color);
            font-size: 1.8rem;
        }

        .back-btn {
            padding: 0.8rem 1.5rem;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-btn:hover {
            background-color: #d91a3a;
        }

        .profile-card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: var(--shadow);
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary-color);
        }

        .profile-info h2 {
            color: var(--text-color);
            margin-bottom: 0.5rem;
        }

        .profile-info p {
            color: #666;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-color);
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(243, 33, 68, 0.1);
        }

        .save-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .save-btn:hover {
            background-color: #d91a3a;
            transform: translateY(-2px);
        }

        #status {
            text-align: center;
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 10px;
            font-weight: 500;
            display: none;
        }

        #status.success {
            display: block;
            background-color: #e8f5e9;
            color: var(--success-color);
        }

        #status.error {
            display: block;
            background-color: #ffebee;
            color: var(--danger-color);
        }

        .upload-pic {
            margin-top: 1rem;
            text-align: center;
        }

        .upload-pic label {
            display: inline-block;
            padding: 0.8rem 1.5rem;
            background: var(--primary-color);
            color: white;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-pic label:hover {
            background-color: #d91a3a;
        }

        .upload-pic input[type="file"] {
            display: none;
        }
        .upload-pic{
    margin-top:15px;
    text-align:center;
}

.upload-btn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:10px 18px;
    background:#4CAF50;
    color:#fff;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
    transition:.3s;
}

.upload-btn:hover{
    background:#388E3C;
}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Profile Settings</h1>

            <a href="user_dashboard.html" class="back-btn" id="backLink">
                <i class="fas fa-arrow-left"></i> Back to Dashboard
            </a>
        </div>

        <div class="profile-card">

            <div class="profile-header">

                <img
                    src="images/default-profile.png"
                    alt="Profile Picture"
                    class="profile-pic"
                    id="profilePic">

                <div class="profile-info">
                    <h2 id="userName">Loading...</h2>
                    <p id="userEmail">Loading...</p>
                </div>

            </div>

            <form id="profileForm" onsubmit="return updateProfile(event)">

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="fullName" required>
                </div>

                <div class="form-group" id="deptGroup">
                    <label>Department</label>
                    <input type="text" id="department">
                </div>

                <div class="form-group" id="roomGroup">
                    <label>Room Number</label>
                    <input type="text" id="roomNumber">
                </div>

                <div class="form-group" id="instituteGroup">
                    <label>Institute ID</label>
                    <input type="text" id="instituteId">
                </div>

                <div class="form-group" id="phoneGroup" style="display:none;">
                    <label>Phone</label>
                    <input type="text" id="phone">
                </div>

                <div class="form-group" id="hostelGroup" style="display:none;">
                    <label>Hostel Name</label>
                    <input type="text" id="hostelName">
                </div>

                <div class="upload-pic">

                    <label for="photoUpload" class="upload-btn">
                        <i class="fas fa-camera"></i>
                        Change Profile Picture
                    </label>

                    <input
                        type="file"
                        id="photoUpload"
                        accept="image/png,image/jpeg,image/jpg"
                        onchange="handlePhotoUpload(event)"
                        hidden>

                </div>

                <button class="save-btn" type="submit">
                    <i class="fas fa-save"></i>
                    Save Changes
                </button>

            </form>

            <div id="status"></div>

        </div>
    </div>

<script>

const isManager = new URLSearchParams(window.location.search).get('role') === 'manager';
const user = isManager ? null : JSON.parse(localStorage.getItem("user") || 'null');
const manager = isManager ? JSON.parse(localStorage.getItem("manager") || 'null') : null;
const managerToken = localStorage.getItem('managerToken');

if (isManager) {
    if (!managerToken || !manager) {
        alert("Please login first");
        window.location.href = "manager_login.html";
    }
} else if (!user) {
    alert("Please login first");
    window.location.href = "login.html";
}

const account = isManager ? manager : user;
const API = window.location.origin;

const profilePic = document.getElementById("profilePic");

function showStatus(message, type = "success") {

    const status = document.getElementById("status");

    status.innerHTML = message;

    status.style.color = type === "success" ? "green" : "red";

    setTimeout(() => {

        status.innerHTML = "";

    },3000);

}

window.onload = function(){
    if (isManager) {
        document.querySelector('.header h1').textContent = 'Manager Profile';
        document.getElementById('backLink').href = 'manager_dashboard.html';
        document.getElementById('deptGroup').querySelector('label').textContent = 'Designation';
        document.getElementById('roomGroup').style.display = 'none';
        document.getElementById('instituteGroup').style.display = 'none';
        document.getElementById('phoneGroup').style.display = 'block';
        document.getElementById('hostelGroup').style.display = 'block';
    }

    document.getElementById("userName").innerText = account.fullName || "";
    document.getElementById("userEmail").innerText = account.email || "";
    document.getElementById("fullName").value = account.fullName || "";

    if (isManager) {
        document.getElementById("department").value = account.designation || "";
        document.getElementById("phone").value = account.phone || "";
        document.getElementById("hostelName").value = account.hostelName || "";
    } else {
        document.getElementById("department").value = account.department || "";
        document.getElementById("roomNumber").value = account.roomNumber || "";
        document.getElementById("instituteId").value = account.instituteId || "";
    }

    if(account.photoUrl){
        profilePic.src = account.photoUrl.startsWith("http")
            ? account.photoUrl
            : `${API}${account.photoUrl}`;
    }
};

async function handlePhotoUpload(event){
    const file = event.target.files[0];
    if(!file) return;
    const formData = new FormData();
    formData.append("photo", file);
    if (!isManager) formData.append("fullName", account.fullName);

    try {
        const url = isManager
            ? `${API}/api/manager/profile`
            : `${API}/api/users/${account._id}`;
        const response = await fetch(url, {
            method: isManager ? "PUT" : "PUT",
            headers: isManager ? { Authorization: `Bearer ${managerToken}` } : {},
            body: formData
        });
        const data = await response.json();
        if(!response.ok) throw new Error(data.message || "Upload failed");

        const updated = isManager ? data.manager : data.user;
        if (isManager) localStorage.setItem('manager', JSON.stringify(updated));
        else localStorage.setItem('user', JSON.stringify(updated));

        if(updated.photoUrl){
            profilePic.src = updated.photoUrl.startsWith("http")
                ? updated.photoUrl : `${API}${updated.photoUrl}`;
        }
        showStatus("Profile picture updated successfully!","success");
    } catch(error) {
        showStatus(error.message,"error");
    }
}

async function updateProfile(event){
    event.preventDefault();
    const formData = new FormData();
    formData.append("fullName", document.getElementById("fullName").value);

    if (isManager) {
        formData.append("designation", document.getElementById("department").value);
        formData.append("phone", document.getElementById("phone").value);
        formData.append("hostelName", document.getElementById("hostelName").value);
    } else {
        formData.append("department", document.getElementById("department").value);
        formData.append("roomNumber", document.getElementById("roomNumber").value);
        formData.append("instituteId", document.getElementById("instituteId").value);
    }

    const photo = document.getElementById("photoUpload").files[0];
    if(photo) formData.append("photo", photo);

    try {
        const url = isManager
            ? `${API}/api/manager/profile`
            : `${API}/api/users/${account._id}/profile`;
        const response = await fetch(url, {
            method: isManager ? "PUT" : "POST",
            headers: isManager ? { Authorization: `Bearer ${managerToken}` } : {},
            body: formData
        });
        const data = await response.json();
        if(!response.ok) throw new Error(data.message || "Update Failed");

        const updated = isManager ? data.manager : data.user;
        if (isManager) localStorage.setItem('manager', JSON.stringify(updated));
        else localStorage.setItem('user', JSON.stringify(updated));

        document.getElementById("userName").innerText = updated.fullName;
        if(updated.photoUrl){
            profilePic.src = updated.photoUrl.startsWith("http")
                ? updated.photoUrl : `${API}${updated.photoUrl}`;
        }
        showStatus("Profile updated successfully!","success");
    } catch(error) {
        showStatus(error.message,"error");
    }
}

</script>
</body>
</html>
