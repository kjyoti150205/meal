<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Meal Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <style>
    :root {
      --primary-color: #f32144;
      --success-color: #4CAF50;
      --danger-color: #f44336;
      --text-color: #333;
      --bg-color: #f5f7fa;
      --card-bg: #ffffff;
      --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg-color);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 400px;
    }

    .card {
      background: var(--card-bg);
      padding: 2rem;
      border-radius: 20px;
      box-shadow: var(--shadow);
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .header h1 {
      color: var(--primary-color);
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
    }

    .header p {
      color: #666;
      font-size: 0.9rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--text-color);
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 0.8rem 1rem;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1rem;
      transition: all 0.3s ease;
      font-family: 'Poppins', sans-serif;
    }

    input:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(243, 33, 68, 0.1);
    }

    .submit-btn {
      background: var(--primary-color);
      color: white;
      border: none;
      padding: 1rem;
      border-radius: 10px;
      cursor: pointer;
      width: 100%;
      font-size: 1rem;
      font-weight: 500;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(243, 33, 68, 0.2);
    }

    .links {
      text-align: center;
      margin-top: 1.5rem;
    }

    .links a {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .links a:hover {
      text-decoration: underline;
    }

    #status {
      text-align: center;
      margin-top: 1rem;
      padding: 1rem;
      border-radius: 10px;
      font-weight: 500;
      display: none;
    }

    #status.success {
      display: block;
      background-color: #e8f5e9;
      color: var(--success-color);
    }

    #status.error {
      display: block;
      background-color: #ffebee;
      color: var(--danger-color);
    }

    .manager-section {
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid #e0e0e0;
      text-align: center;
    }

    .manager-links {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 1rem;
    }

    .manager-link {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      border-radius: 10px;
      transition: all 0.3s ease;
      background: rgba(243, 33, 68, 0.1);
    }

    .manager-link:hover {
      background: rgba(243, 33, 68, 0.2);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <h1>Meal Tracker</h1>
        <a href="index.html" class="home-btn" style="background: var(--primary-color); color: white; padding: 0.8rem 1.5rem; border-radius: 8px; text-decoration: none; display: flex; align-items: center; gap: 0.5rem;">
            <i class="fas fa-home"></i> Home
        </a>
      </div>
      <form id="loginForm" onsubmit="return handleLogin(event)">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="submit-btn">
          <i class="fas fa-sign-in-alt"></i> Login
        </button>
      </form>
      <div id="status"></div>
      <div class="links">
        <p>Don't have an account? <a href="register.html">Register here</a></p>
      </div>
      <div class="manager-section">
        <p>Are you a manager?</p>
        <div class="manager-links">
          <a href="manager_login.html" class="manager-link">
            <i class="fas fa-user-shield"></i> Manager Login
          </a>
          <a href="manager_register.html" class="manager-link">
            <i class="fas fa-user-plus"></i> Manager Register
          </a>
        </div>
      </div>
    </div>
  </div>

  <script>
    async function handleLogin(event) {
        event.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const status = document.getElementById('status');

        try {
            // Clear any existing user data
            localStorage.removeItem('user');
            localStorage.removeItem('manager');

            const response = await fetch('http://localhost:3000/api/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.message || 'Login failed');
            }

            // Store user data in localStorage
            localStorage.setItem('user', JSON.stringify(data.user));

            // Show success message
            status.textContent = 'Login successful! Redirecting...';
            status.className = 'success';

            // Redirect to user dashboard
            setTimeout(() => {
                window.location.href = 'user_dashboard.html';
            }, 1000);
        } catch (error) {
            console.error('Login error:', error);
            status.textContent = error.message || 'Login failed. Please try again.';
            status.className = 'error';
        }
    }

    // Check if already logged in
    const user = JSON.parse(localStorage.getItem('user'));
    if (user) {
        window.location.href = 'user_dashboard.html';
    }
  </script>
</body>
</html>
