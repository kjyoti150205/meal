<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Records - Meal Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="public/css/manager-dashboard.css">
</head>
<body>
    <div class="mgr-sidebar-overlay" id="mgrSidebarOverlay"></div>
    <div class="mgr-layout">
        <aside class="mgr-sidebar" id="mgrSidebar">
            <div class="mgr-sidebar-brand"><i class="fas fa-utensils"></i><div><h2>Meal Tracker</h2><span>Manager Portal</span></div></div>
            <nav class="mgr-nav">
                <a href="manager_dashboard.html" class="mgr-nav-link" data-page="dashboard"><i class="fas fa-th-large"></i> Dashboard</a>
                <a href="view_entries.html" class="mgr-nav-link" data-page="entries"><i class="fas fa-list-alt"></i> View Entries</a>
                <a href="student_records.html" class="mgr-nav-link" data-page="records"><i class="fas fa-user-graduate"></i> Student Records</a>
                <a href="reports.html" class="mgr-nav-link" data-page="reports"><i class="fas fa-chart-line"></i> Reports</a>
                <a href="profile.html?role=manager" class="mgr-nav-link" data-page="profile"><i class="fas fa-user-circle"></i> Profile</a>
            </nav>
            <div class="mgr-sidebar-footer">
                <div class="mgr-user-card"><div class="mgr-user-avatar" id="mgrUserAvatar">M</div><div class="mgr-user-info"><strong id="mgrUserName">Manager</strong><small>Manager</small></div></div>
                <button class="mgr-btn mgr-btn-outline" id="mgrLogoutBtn" style="width:100%;color:#fff;border-color:rgba(255,255,255,0.2);"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </aside>

        <main class="mgr-main">
            <header class="mgr-topbar">
                <div style="display:flex;align-items:center;gap:0.75rem;">
                    <button class="mgr-menu-toggle" id="mgrMenuToggle"><i class="fas fa-bars"></i></button>
                    <h1>Student Records</h1>
                </div>
                <span class="mgr-refresh-badge"><i class="fas fa-database"></i> MongoDB Live</span>
            </header>

            <div class="mgr-content">
                <div class="mgr-card">
                    <div class="mgr-card-body">
                        <div class="mgr-filters">
                            <input type="text" class="mgr-input" id="searchInput" placeholder="Search name, ID, email, room...">
                            <input type="date" class="mgr-input" id="dateFilter" title="Historical date">
                            <select class="mgr-select" id="departmentFilter"><option value="">All Departments</option></select>
                            <input type="text" class="mgr-input" id="roomFilter" placeholder="Room filter">
                            <select class="mgr-select" id="verificationFilter">
                                <option value="">All Verification</option>
                                <option value="approved">Approved</option>
                                <option value="pending">Pending</option>
                                <option value="rejected">Rejected</option>
                            </select>
                            <select class="mgr-select" id="mealStatusFilter">
                                <option value="">Meal Status</option>
                                <option value="ON">ON</option>
                                <option value="OFF">OFF</option>
                            </select>
                            <select class="mgr-select" id="sessionFilter">
                                <option value="">All Sessions</option>
                                <option value="Morning">Morning</option>
                                <option value="Evening">Evening</option>
                            </select>
                            <select class="mgr-select" id="sortBy">
                                <option value="fullName">Sort: Name</option>
                                <option value="department">Department</option>
                                <option value="roomNumber">Room</option>
                                <option value="registrationDate">Registration</option>
                            </select>
                            <select class="mgr-select" id="sortOrder">
                                <option value="asc">Ascending</option>
                                <option value="desc">Descending</option>
                            </select>
                            <button class="mgr-btn mgr-btn-primary" onclick="loadStudents(1)"><i class="fas fa-search"></i> Search</button>
                            <button class="mgr-btn mgr-btn-outline" onclick="resetFilters()"><i class="fas fa-undo"></i> Reset</button>
                        </div>
                    </div>
                </div>

                <div class="mgr-card">
                    <div class="mgr-card-header">
                        <h2><i class="fas fa-table"></i> All Students <small id="recordCount" style="font-weight:400;color:var(--mgr-text-muted);"></small></h2>
                        <button class="mgr-btn mgr-btn-outline mgr-btn-sm" onclick="loadStudents(currentPage)"><i class="fas fa-sync-alt"></i> Refresh</button>
                    </div>
                    <div class="mgr-card-body mgr-table-wrap">
                        <table class="mgr-table">
                            <thead>
                                <tr>
                                    <th>Photo</th>
                                    <th>Name</th>
                                    <th>Institute ID</th>
                                    <th>Email</th>
                                    <th>Department</th>
                                    <th>Room</th>
                                    <th>Verification</th>
                                    <th>Morning</th>
                                    <th>Evening</th>
                                    <th>Registered</th>
                                    <th>Updated</th>
                                    <th>History</th>
                                </tr>
                            </thead>
                            <tbody id="studentsBody">
                                <tr><td colspan="12"><div class="mgr-empty"><i class="fas fa-spinner fa-spin"></i><p>Loading...</p></div></td></tr>
                            </tbody>
                        </table>
                        <div class="mgr-pagination" id="pagination"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="public/js/manager-common.js"></script>
    <script>
        let currentPage = 1;

        function resetFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('dateFilter').value = '';
            document.getElementById('departmentFilter').value = '';
            document.getElementById('roomFilter').value = '';
            document.getElementById('verificationFilter').value = '';
            document.getElementById('mealStatusFilter').value = '';
            document.getElementById('sessionFilter').value = '';
            loadStudents(1);
        }

        function buildQuery(page) {
            const params = new URLSearchParams({ page, limit: 20 });
            const search = document.getElementById('searchInput').value.trim();
            const date = document.getElementById('dateFilter').value;
            const department = document.getElementById('departmentFilter').value;
            const room = document.getElementById('roomFilter').value;
            const verification = document.getElementById('verificationFilter').value;
            const mealStatus = document.getElementById('mealStatusFilter').value;
            const session = document.getElementById('sessionFilter').value;
            const sortBy = document.getElementById('sortBy').value;
            const sortOrder = document.getElementById('sortOrder').value;

            if (search) params.set('search', search);
            if (department) params.set('department', department);
            if (room) params.set('room', room);
            if (verification) params.set('verification', verification);
            if (mealStatus) params.set('mealStatus', mealStatus);
            if (session) params.set('session', session);
            params.set('sortBy', sortBy);
            params.set('sortOrder', sortOrder);

            const endpoint = date ? `/api/manager/student-records?date=${date}&${params}` : `/api/manager/students?${params}`;
            return { endpoint, date };
        }

        async function loadStudents(page = 1) {
            currentPage = page;
            showLoading(true);
            try {
                const { endpoint, date } = buildQuery(page);
                const data = await managerFetch(endpoint);

                document.getElementById('recordCount').textContent = `(${data.total} students)`;
                const tbody = document.getElementById('studentsBody');

                const students = data.students || [];
                if (!students.length) {
                    tbody.innerHTML = '<tr><td colspan="12"><div class="mgr-empty"><i class="fas fa-user-graduate"></i><p>No students found</p></div></td></tr>';
                } else {
                    tbody.innerHTML = students.map((s) => {
                        const photo = studentPhotoUrl(s.photoUrl);
                        const photoHtml = photo
                            ? `<img class="mgr-student-photo" src="${photo}" alt="">`
                            : `<div class="mgr-student-photo-placeholder">${getInitials(s.fullName || s.name)}</div>`;
                        const name = s.fullName || s.name;
                        return `<tr>
                            <td>${photoHtml}</td>
                            <td>${escapeHtml(name)}</td>
                            <td>${escapeHtml(s.instituteId || '—')}</td>
                            <td>${escapeHtml(s.email || '—')}</td>
                            <td>${escapeHtml(s.department || '—')}</td>
                            <td>${escapeHtml(s.roomNumber || s.room || '—')}</td>
                            <td>${statusBadge(s.verificationStatus || 'approved')}</td>
                            <td>${statusBadge(s.morningStatus)}</td>
                            <td>${statusBadge(s.eveningStatus)}</td>
                            <td>${formatDate(s.registrationDate || s.date)}</td>
                            <td>${formatDateTime(s.lastUpdated || s.morningTime || s.eveningTime)}</td>
                            <td><button class="mgr-btn mgr-btn-outline mgr-btn-sm" onclick="viewHistory('${s._id}','${escapeHtml(name)}')"><i class="fas fa-history"></i></button></td>
                        </tr>`;
                    }).join('');
                }

                renderPagination('pagination', data.page, data.totalPages, loadStudents);

                if (!date) {
                    const depts = [...new Set(students.map((s) => s.department).filter((d) => d && d !== '—'))];
                    const deptSelect = document.getElementById('departmentFilter');
                    const current = deptSelect.value;
                    deptSelect.innerHTML = '<option value="">All Departments</option>' +
                        depts.map((d) => `<option value="${escapeHtml(d)}" ${d === current ? 'selected' : ''}>${escapeHtml(d)}</option>`).join('');
                }
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                showLoading(false);
            }
        }

        async function viewHistory(userId, name) {
            try {
                const data = await managerFetch(`/api/manager/meal-history/${userId}`);
                const lines = data.history.slice(0, 30).map((h) =>
                    `${h.date}: Morning ${h.morning || '—'} | Evening ${h.evening || '—'}`
                ).join('\n');
                alert(`Meal History — ${name}\n\n${lines || 'No history found'}`);
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        if (checkManagerAuth()) {
            initSidebar('records');
            loadStudents(1);
            setInterval(() => loadStudents(currentPage), 30000);
        }
    </script>
</body>
</html>
