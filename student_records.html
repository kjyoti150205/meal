<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Meal Records - Meal Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #2196F3;
            --primary-dark: #1976D2;
            --primary-light: #BBDEFB;
            --success-color: #4CAF50;
            --danger-color: #f44336;
            --text-color: #333;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --border-radius: 12px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-color);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            background: white;
            padding: 1.5rem 2rem;
            border-radius: 15px;
            box-shadow: var(--shadow);
        }
        .header h1 {
            color: var(--primary-color);
            font-size: 2rem;
            font-weight: 600;
            margin: 0;
        }
        .home-btn {
            background: var(--primary-color);
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }
        .home-btn:hover {
            background: var(--primary-dark);
        }
        .records-container {
            background: white;
            border-radius: 15px;
            padding: 2rem;
            box-shadow: var(--shadow);
            overflow-x: auto;
        }
        .month-selector {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .month-selector button {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--primary-color);
        }
        .month-selector h2 {
            font-size: 1.5rem;
            color: var(--text-color);
        }
        .records-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        .records-table th, .records-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        .records-table th {
            background: var(--primary-color);
            color: white;
            position: sticky;
            top: 0;
        }
        .records-table tr:nth-child(even) {
            background: #f9f9f9;
        }
        .meal-cell {
            padding: 0.5rem;
            border-radius: 4px;
            text-align: center;
        }
        .meal-cell.chicken { background: #e8f5e9; }
        .meal-cell.paneer { background: #fff3e0; }
        .meal-cell.fish { background: #e3f2fd; }
        .meal-cell.omelette { background: #f3e5f5; }
        .meal-cell.manager { background: #f5f5f5; color: #666; }
        .legend {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }
        .auto-refresh {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1rem;
            padding: 0.5rem;
            background: var(--primary-light);
            border-radius: 8px;
            color: var(--primary-dark);
        }
        .auto-refresh i {
            animation: spin 2s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Student Meal Records</h1>
            <a href="index.html" class="home-btn"><i class="fas fa-home"></i> Home</a>
        </div>
        
        <div class="records-container">
            <div class="month-selector">
                <button onclick="previousMonth()" title="Previous Month"><i class="fas fa-chevron-left"></i></button>
                <h2 id="currentMonth">Month Year</h2>
                <button onclick="nextMonth()" title="Next Month"><i class="fas fa-chevron-right"></i></button>
            </div>

            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color" style="background: #e8f5e9;"></div>
                    <span>Chicken</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #fff3e0;"></div>
                    <span>Paneer</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #e3f2fd;"></div>
                    <span>Fish</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #f3e5f5;"></div>
                    <span>Omelette</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #f5f5f5;"></div>
                    <span>Manager's Choice</span>
                </div>
            </div>

            <div class="auto-refresh">
                <i class="fas fa-sync-alt"></i>
                <span>Auto-refreshing every 30 seconds</span>
            </div>

            <div style="overflow-x: auto;">
                <table class="records-table">
                    <thead>
                        <tr>
                            <th>Student Name</th>
                            <th>Room No.</th>
                            <th id="datesHeader"></th>
                        </tr>
                    </thead>
                    <tbody id="studentRecords">
                        <!-- Student records will be populated here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let currentDate = new Date();
        let lastUpdate = new Date();

        // Function to get all registered students from localStorage
        function getRegisteredStudents() {
            const users = JSON.parse(localStorage.getItem('users')) || [];
            return users.filter(user => user.role === 'student').map(user => ({
                id: user.id,
                name: user.fullName,
                room: user.room || 'N/A'
            }));
        }

        function pad(n) { return n < 10 ? '0' + n : n; }

        function generateCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const monthStr = `${year}-${pad(month+1)}`;
            const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
            document.getElementById('currentMonth').textContent = `${monthNames[month]} ${year}`;
            
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const totalDays = lastDay.getDate();
            
            // Generate date headers
            const datesHeader = document.getElementById('datesHeader');
            datesHeader.innerHTML = '';
            for (let day = 1; day <= totalDays; day++) {
                const date = new Date(year, month, day);
                const dayOfWeek = date.getDay();
                const isWednesday = dayOfWeek === 3;
                const isSunday = dayOfWeek === 0;
                
                const th = document.createElement('th');
                th.textContent = `${day}${isWednesday ? ' (Wed)' : isSunday ? ' (Sun)' : ''}`;
                th.style.backgroundColor = isWednesday || isSunday ? '#e8f5e9' : '#f5f5f5';
                datesHeader.appendChild(th);
            }
            
            // Get students from localStorage
            const students = getRegisteredStudents();
            
            // Generate student records
            const tbody = document.getElementById('studentRecords');
            tbody.innerHTML = '';
            
            students.forEach(student => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${student.name}</td>
                    <td>${student.room}</td>
                `;
                
                for (let day = 1; day <= totalDays; day++) {
                    const date = new Date(year, month, day);
                    const dayOfWeek = date.getDay();
                    const isWednesday = dayOfWeek === 3;
                    const isSunday = dayOfWeek === 0;
                    
                    const td = document.createElement('td');
                    td.className = 'meal-cell';
                    
                    if (isWednesday || isSunday) {
                        // Get meal preference from localStorage
                        const dateString = `${year}-${pad(month+1)}-${pad(day)}`;
                        const meal = localStorage.getItem(`meal_${student.id}_${dateString}`) || '';
                        
                        if (meal) {
                            td.textContent = meal;
                            td.classList.add(meal.toLowerCase());
                        } else {
                            td.textContent = 'Not Selected';
                            td.style.background = '#ffebee';
                        }
                    } else {
                        td.textContent = "Manager's Choice";
                        td.classList.add('manager');
                    }
                    row.appendChild(td);
                }
                tbody.appendChild(row);
            });

            // Update last update time
            lastUpdate = new Date();
        }

        function previousMonth() {
            currentDate.setMonth(currentDate.getMonth() - 1);
            generateCalendar();
        }

        function nextMonth() {
            currentDate.setMonth(currentDate.getMonth() + 1);
            generateCalendar();
        }

        // Function to check for changes in localStorage
        function checkForChanges() {
            const currentTime = new Date();
            if (currentTime - lastUpdate >= 30000) { // Check every 30 seconds
                generateCalendar();
            }
        }

        // Initialize the calendar
        document.addEventListener('DOMContentLoaded', generateCalendar);

        // Set up storage event listener for real-time updates
        window.addEventListener('storage', function(e) {
            if (e.key && e.key.startsWith('meal_')) {
                generateCalendar();
            }
        });

        // Check for changes periodically
        setInterval(checkForChanges, 5000); // Check every 5 seconds
    </script>
</body>
</html>
