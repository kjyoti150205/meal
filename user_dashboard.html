<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - Meal Tracker</title>
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #f32144;
            --text-color: #333;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-color);
            min-height: 100vh;
        }

        /* Navbar Styles */
        .navbar {
            background: white;
            padding: 1rem 2rem;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        .navbar h1 {
            color: var(--primary-color);
            font-size: 1.5rem;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-link {
            color: var(--text-color);
            text-decoration: none;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.3s ease;
        }

        .nav-link:hover {
            color: var(--primary-color);
        }

        .nav-link.active {
            color: var(--primary-color);
        }

        .profile-section {
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            position: relative;
        }

        .profile-img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary-color);
        }

        .profile-name {
            font-weight: 500;
            color: var(--text-color);
        }

        .logout-btn {
            background: var(--danger-color);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: inherit;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #d32f2f;
            transform: translateY(-2px);
        }

        /* Main Content */
        .main-content {
            margin-top: 80px;
            padding: 2rem;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }

        .welcome-card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: var(--shadow);
            text-align: center;
            margin-bottom: 2rem;
        }

        .welcome-card h2 {
            color: var(--text-color);
            margin-bottom: 1rem;
            font-size: 2rem;
        }

        .welcome-card p {
            color: #666;
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .meal-thumbnail {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: var(--shadow);
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .meal-thumbnail:hover {
            transform: translateY(-5px);
        }

        .meal-thumbnail i {
            font-size: 3rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
        }

        .meal-thumbnail h3 {
            color: var(--text-color);
            margin-bottom: 0.5rem;
        }

        .meal-thumbnail p {
            color: #666;
        }

        /* Session Toggle Styles */
        .session-toggle {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: var(--shadow);
            margin-top: 2rem;
        }

        .session-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .session-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-color);
        }

        .session-title i {
            color: var(--primary-color);
        }

        .session-time {
            color: #666;
            font-size: 0.9rem;
        }

        .toggle-btn {
            background: #e0e0e0;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .toggle-btn.active {
            background: var(--primary-color);
            color: white;
        }

        .toggle-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .session-status {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            display: none;
        }

        .session-status.active {
            display: block;
            background: #e8f5e9;
            color: #4CAF50;
        }

        .session-status.inactive {
            display: block;
            background: #ffebee;
            color: #f44336;
        }

        .session-status.closed {
            display: block;
            background: #f5f5f5;
            color: #666;
        }

        /* History Styles */
        .history-section {
            margin-top: 2rem;
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: var(--shadow);
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .history-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-color);
        }

        .history-title i {
            color: var(--primary-color);
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: var(--bg-color);
            border-radius: 8px;
        }

        .history-item-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .history-item-status {
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .history-item-status.on {
            background: #e8f5e9;
            color: #4CAF50;
        }

        .history-item-status.off {
            background: #ffebee;
            color: #f44336;
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 1rem;
            }

            .nav-links {
                gap: 1rem;
            }

            .profile-name {
                display: none;
            }

            .main-content {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <h1>Meal Tracker</h1>
        <div class="nav-links">
            <a href="index.html" class="nav-link">
                <i class="fas fa-home"></i>
                Home
            </a>
            <a href="#" class="nav-link">
                <i class="fas fa-history"></i>
                History
            </a>
            <a href="profile.html" class="profile-section">
                <img src="https://via.placeholder.com/40" alt="Profile" class="profile-img" id="profileImg">
                <span class="profile-name" id="profileName">Loading...</span>
            </a>
            <button onclick="logout()" style="background: #f44336; color: white; border: none; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; font-family: inherit; font-weight: 500; transition: all 0.3s ease;">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </nav>

    <div class="main-content">
        <div class="welcome-card">
            <h2>Welcome Back!</h2>
            <p>Manage your meals efficiently with our easy-to-use meal tracking system.</p>
            <a href="index.html" class="home-btn" style="display: inline-flex; align-items: center; gap: 0.5rem; margin-top: 1rem; background: var(--primary-color); color: white; padding: 0.8rem 1.5rem; border-radius: 8px; text-decoration: none;">
                <i class="fas fa-home"></i> Go to Home
            </a>
        </div>

        <div class="meal-thumbnail">
            <i class="fas fa-utensils"></i>
            <h3>Manage Your Meals</h3>
            <p>Click here to track and manage your daily meals</p>
        </div>

        <div class="session-toggle">
            <div class="session-header">
                <div class="session-title">
                    <i class="fas fa-sun"></i>
                    <h3>Morning Session</h3>
                </div>
                <span class="session-time">Before 6:30 AM</span>
            </div>
            <button id="morningToggle" class="toggle-btn" onclick="toggleSession('morning')">
                <i class="fas fa-power-off"></i>
                <span>Turn On</span>
            </button>
            <div id="morningStatus" class="session-status"></div>
        </div>

        <div class="session-toggle">
            <div class="session-header">
                <div class="session-title">
                    <i class="fas fa-moon"></i>
                    <h3>Evening Session</h3>
                </div>
                <span class="session-time">Before 6:30 PM</span>
            </div>
            <button id="eveningToggle" class="toggle-btn" onclick="toggleSession('evening')">
                <i class="fas fa-power-off"></i>
                <span>Turn On</span>
            </button>
            <div id="eveningStatus" class="session-status"></div>
        </div>

        <div class="history-section">
            <div class="history-header">
                <div class="history-title">
                    <i class="fas fa-history"></i>
                    <h3>Session History</h3>
                </div>
            </div>
            <div id="historyList" class="history-list">
                <!-- History items will be loaded here -->
            </div>
        </div>
    </div>

    <script>
        // Check if user is logged in
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) {
            window.location.href = 'login.html';
        }

        // Display user information
        document.getElementById('profileName').textContent = user.fullName;
        
        // Set profile picture
        const profileImg = document.getElementById('profileImg');
        if (user.photoUrl) {
            profileImg.src = user.photoUrl;
        }

        // Logout function
        function logout() {
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }

        // Session management
        async function checkSessionTime() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            const currentTime = hours * 60 + minutes;
            
            const morningStart = 0; // 12:00 AM
            const morningEnd = 6 * 60 + 30; // 6:30 AM
            const eveningStart = 12 * 60; // 12:00 PM
            const eveningEnd = 18 * 60 + 30; // 6:30 PM

            const morningBtn = document.getElementById('morningToggle');
            const eveningBtn = document.getElementById('eveningToggle');

            // Check if sessions are already used today
            const today = new Date().toDateString();
            const sessions = await fetchUserSessions();
            const todaySessions = sessions.filter(s => new Date(s.date).toDateString() === today);

            // Morning session
            if (currentTime >= morningStart && currentTime <= morningEnd) {
                const morningSession = todaySessions.find(s => s.sessionType === 'morning');
                if (morningSession) {
                    morningBtn.disabled = true;
                    updateSessionStatus('morning', 'closed', 'Morning session already used today');
                } else {
                    morningBtn.disabled = false;
                    updateSessionStatus('morning', 'active', 'Session is open');
                }
            } else {
                morningBtn.disabled = true;
                updateSessionStatus('morning', 'closed', 'Morning session is closed');
            }

            // Evening session
            if (currentTime >= eveningStart && currentTime <= eveningEnd) {
                const eveningSession = todaySessions.find(s => s.sessionType === 'evening');
                if (eveningSession) {
                    eveningBtn.disabled = true;
                    updateSessionStatus('evening', 'closed', 'Evening session already used today');
                } else {
                    eveningBtn.disabled = false;
                    updateSessionStatus('evening', 'active', 'Session is open');
                }
            } else {
                eveningBtn.disabled = true;
                updateSessionStatus('evening', 'closed', 'Evening session is closed');
            }
        }

        async function toggleSession(session) {
            const btn = document.getElementById(`${session}Toggle`);
            const status = document.getElementById(`${session}Status`);
            
            try {
                const response = await fetch(`http://localhost:3000/api/entries`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        userId: user._id,
                        session: session.charAt(0).toUpperCase() + session.slice(1),
                        status: btn.classList.contains('active') ? 'OFF' : 'ON',
                        name: user.fullName,
                        department: user.department,
                        roomNumber: user.roomNumber
                    })
                });

                if (!response.ok) {
                    throw new Error('Failed to save session');
                }

                if (btn.classList.contains('active')) {
                    btn.classList.remove('active');
                    btn.querySelector('span').textContent = 'Turn On';
                    updateSessionStatus(session, 'inactive', `${session.charAt(0).toUpperCase() + session.slice(1)} session is off`);
                } else {
                    btn.classList.add('active');
                    btn.querySelector('span').textContent = 'Turn Off';
                    updateSessionStatus(session, 'active', `${session.charAt(0).toUpperCase() + session.slice(1)} session is on`);
                }

                // Update history
                loadHistory();
            } catch (error) {
                console.error('Error toggling session:', error);
                showStatus('Error saving session. Please try again.', 'error');
            }
        }

        function updateSessionStatus(session, type, message) {
            const status = document.getElementById(`${session}Status`);
            status.className = `session-status ${type}`;
            status.textContent = message;
        }

        async function fetchUserSessions() {
            try {
                const response = await fetch(`http://localhost:3000/api/entries`);
                if (!response.ok) {
                    throw new Error('Failed to fetch sessions');
                }
                const entries = await response.json();
                // Filter entries for current user
                return entries.filter(entry => entry.userId === user._id);
            } catch (error) {
                console.error('Error fetching sessions:', error);
                return [];
            }
        }

        async function loadHistory() {
            const sessions = await fetchUserSessions();
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = '';

            // Sort sessions by date (newest first)
            sessions.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

            sessions.forEach(session => {
                const historyItem = document.createElement('div');
                historyItem.className = 'history-item';
                historyItem.innerHTML = `
                    <div class="history-item-info">
                        <i class="fas ${session.session === 'Morning' ? 'fa-sun' : 'fa-moon'}"></i>
                        <div>
                            <div>${session.session} Session</div>
                            <div style="font-size: 0.8rem; color: #666;">
                                ${new Date(session.timestamp).toLocaleDateString()} ${new Date(session.timestamp).toLocaleTimeString()}
                            </div>
                        </div>
                    </div>
                    <div class="history-item-status ${session.status.toLowerCase()}">
                        ${session.status}
                    </div>
                `;
                historyList.appendChild(historyItem);
            });
        }

        // Check session times every minute
        checkSessionTime();
        setInterval(checkSessionTime, 60000);

        // Load initial history
        loadHistory();
    </script>
</body>
</html>
